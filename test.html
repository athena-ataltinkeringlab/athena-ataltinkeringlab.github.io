<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Athena Global School Yearbook 2025-26</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  color: white;
  overflow: hidden;
}

* {
  box-sizing: border-box;
}

.app {
  padding: 10px;
  height: 100vh;
  box-sizing: border-box;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(16px);
  padding: 6px 10px;
  border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.35);
  margin-bottom: 6px;
}

.nav-group,
.zoom-group,
.move-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.title-center {
  flex: 1;
  text-align: center;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.05em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.btn {
  padding: 4px 10px;
  background: linear-gradient(45deg, rgba(59,130,246,0.9), rgba(147,51,234,0.9));
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 999px;
  font-weight: 600;
  font-size: 11px;
  transition: all 0.2s;
  box-shadow: 0 3px 10px rgba(59,130,246,0.4);
  white-space: nowrap;
}

.btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 18px rgba(59,130,246,0.5);
}

.page-info {
  font-size: 12px;
  font-weight: 600;
  background: rgba(255,255,255,0.12);
  padding: 6px 10px;
  border-radius: 999px;
  display: inline-block;
  margin-bottom: 6px;
}

.viewer {
  display: grid;
  grid-template-columns: 1fr 150px;
  gap: 10px;
  height: calc(100vh - 76px);
}

.main {
  position: relative;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(16px);
  border-radius: 12px;
  box-shadow: 0 16px 32px rgba(0,0,0,0.4);
  overflow: hidden;
  touch-action: pan-y;
  cursor: default;
}

.book-center {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.book-pan {
  transform: translate3d(0px, 0px, 0);
  will-change: transform;
}

.book-transform {
  transform: translateZ(0) scale(0.8) rotate(0deg);
  transform-origin: center center;
  transition: none;
}

#book {
  width: 1120px;
  height: 792px;
  max-width: none;
}

.page {
  background: #ffffff;
  border-radius: 6px;
  overflow: hidden;
  position: relative;
}

.page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  user-select: none;
  -webkit-user-drag: none;
}

.page-loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #334155;
  font-size: 14px;
  background: #fff;
}

.thumbs {
  overflow: auto;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(16px);
  border-radius: 12px;
  padding: 8px;
  box-shadow: 0 10px 24px rgba(0,0,0,0.35);
}

.thumb {
  margin-bottom: 6px;
  cursor: pointer;
  border-radius: 8px;
  overflow: hidden;
  transition: all 0.15s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  background: rgba(255,255,255,0.08);
}

.thumb img {
  width: 100%;
  aspect-ratio: 1/1.414;
  object-fit: cover;
  display: block;
}

.thumb.active {
  box-shadow: 0 0 0 2px rgba(59,130,246,0.95);
  transform: scale(1.03);
}

.loading {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: min(360px, calc(100% - 40px));
  z-index: 10;
  background: rgba(15, 23, 42, 0.88);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px;
  padding: 18px 16px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.35);
  backdrop-filter: blur(12px);
}

.loading-title {
  font-size: 14px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 10px;
}

.loading-subtext {
  font-size: 12px;
  text-align: center;
  color: rgba(255,255,255,0.72);
  margin-top: 8px;
}

.progress-wrap {
  width: 100%;
  height: 12px;
  background: rgba(255,255,255,0.12);
  border-radius: 999px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  border-radius: 999px;
  background: linear-gradient(90deg, #3b82f6, #9333ea);
  transition: width 0.2s ease;
}

.progress-text {
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  margin-top: 8px;
}

.bg-status {
  position: absolute;
  right: 12px;
  bottom: 12px;
  background: rgba(15, 23, 42, 0.82);
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.85);
  font-size: 11px;
  padding: 6px 10px;
  border-radius: 999px;
  z-index: 6;
  display: none;
}

#desktopHint {
  display: none;
}

@media (max-width:768px) {
  body {
    overflow: hidden;
  }

  .app {
    padding: 8px;
  }

  .topbar {
    justify-content: center;
    padding: 10px 12px;
  }

  .title-center {
    flex: unset;
    width: 100%;
    text-align: center;
    font-size: 13px;
    white-space: normal;
    line-height: 1.35;
  }

  .nav-group,
  .zoom-group,
  .move-group {
    display: none !important;
  }

  .page-info {
    display: none !important;
  }

  .viewer {
    grid-template-columns: 1fr;
    grid-template-rows: minmax(0, 1fr) auto auto;
    gap: 8px;
    height: calc(100vh - 118px);
  }

  .main {
    min-height: 0;
  }

  .book-center {
    padding: 20px 14px 14px;
  }

  .thumbs {
    display: block;
    max-height: 110px;
    overflow-x: auto;
    overflow-y: hidden;
    white-space: nowrap;
    padding: 6px;
    border-radius: 10px;
  }

  .thumb {
    display: inline-block;
    width: 62px;
    margin-right: 6px;
    margin-bottom: 0;
    vertical-align: top;
    transform: none !important;
  }

  .thumb.active {
    transform: none !important;
  }

  #desktopHint {
    display: block;
    position: static;
    width: 100%;
    text-align: center;
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    pointer-events: none;
    margin-top: 2px;
    padding-bottom: 2px;
  }

  .book-pan,
  .book-transform,
  #book,
  .page,
  .page img,
  .stf__parent,
  .stf__wrapper,
  .stf__block,
  .stf__item,
  .stf__page {
    backface-visibility: hidden !important;
    -webkit-backface-visibility: hidden !important;
    -webkit-font-smoothing: antialiased;
  }

  .book-pan {
    transform: translate3d(0px, 0px, 0);
  }

  .book-transform {
    transition: none !important;
    will-change: auto !important;
    transform-origin: center center;
    transform-style: preserve-3d;
    -webkit-transform-style: preserve-3d;
  }

  .stf__parent,
  .stf__wrapper,
  .stf__block,
  .stf__item,
  .stf__page {
    transform-style: preserve-3d !important;
    -webkit-transform-style: preserve-3d !important;
  }

  .page img {
    image-rendering: auto;
    transform: translateZ(0);
    -webkit-transform: translateZ(0);
  }

  .loading {
    width: min(320px, calc(100% - 26px));
    top: 46%;
  }
}
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="nav-group">
      <button class="btn" id="prev">‹ Prev</button>
      <button class="btn" id="next">Next ›</button>
    </div>

    <div class="title-center">
      Athena Global School Yearbook 2025-26
    </div>

    <div class="zoom-group">
      <button class="btn" id="zoomOut">−</button>
      <button class="btn" id="zoomReset">80%</button>
      <button class="btn" id="zoomIn">+</button>

      <button class="btn" id="rotateLeft">⟲</button>
      <button class="btn" id="rotateReset">0°</button>
      <button class="btn" id="rotateRight">⟳</button>
    </div>

    <div class="move-group">
      <button class="btn" id="moveUp">↑ Up</button>
      <button class="btn" id="moveDown">↓ Down</button>
    </div>
  </div>

  <div class="page-info" id="pageText">Pages 1 - 2</div>

  <div class="viewer">
    <div class="main" id="viewerMain">
      <div class="loading" id="loading">
        <div class="loading-title">Loading yearbook</div>
        <div class="progress-wrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-text" id="progressText">0 / 10</div>
        <div class="loading-subtext" id="loadingSubtext">Preparing first pages...</div>
      </div>

      <div class="bg-status" id="bgStatus">Loading remaining pages...</div>

      <div class="book-center">
        <div class="book-pan" id="bookPan">
          <div class="book-transform" id="bookTransform">
            <div id="book"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="thumbs" id="thumbs"></div>

    <div id="desktopHint">For better viewing experience, use desktop view</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

<script>
let pageFlip;

const book = document.getElementById("book");
const thumbs = document.getElementById("thumbs");
const pageText = document.getElementById("pageText");
const loading = document.getElementById("loading");
const viewerMain = document.getElementById("viewerMain");
const bookPan = document.getElementById("bookPan");
const bookTransform = document.getElementById("bookTransform");
const progressBar = document.getElementById("progressBar");
const progressText = document.getElementById("progressText");
const loadingSubtext = document.getElementById("loadingSubtext");
const bgStatus = document.getElementById("bgStatus");

const TOTAL_PAGES = 136;
const INITIAL_LOAD_COUNT = 10;
const pageImages = [];
for (let i = 1; i <= TOTAL_PAGES; i++) {
  pageImages.push(`assets/images/Img/${i}.jpg`);
}

let currentPage = 0;
let isFlippingNow = false;

/* Desktop controls */
let zoomLevel = 0.8;
const defaultZoom = 0.8;
const minZoom = 0.5;
const maxZoom = 2;
const zoomStep = 0.05;

let rotateDeg = 0;
const rotateStep = 90;

let offsetX = 0;
let offsetY = 0;
let isDragging = false;
let dragStartX = 0;
let dragStartY = 0;
let startOffsetX = 0;
let startOffsetY = 0;

let pinchStartDistance = 0;
let pinchStartZoom = zoomLevel;

const moveStep = 40;

const preloadedBookImages = new Map();
const pageImgElements = [];
const thumbImgElements = [];

function isMobileView() {
  return window.innerWidth <= 768;
}

function getBookBaseWidth() {
  return isMobileView() ? 560 : 1120;
}

function getBookBaseHeight() {
  return 792;
}

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function getTouchDistance(t1, t2) {
  const dx = t2.clientX - t1.clientX;
  const dy = t2.clientY - t1.clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

function canPan() {
  return zoomLevel > defaultZoom + 0.01 || rotateDeg % 360 !== 0;
}

function resetPosition() {
  offsetX = 0;
  offsetY = 0;
}

function getEffectiveSize() {
  const baseWidth = getBookBaseWidth();
  const baseHeight = getBookBaseHeight();

  const normalizedRotate = ((rotateDeg % 360) + 360) % 360;
  const quarterTurns = normalizedRotate === 90 || normalizedRotate === 270;

  const w = baseWidth * zoomLevel;
  const h = baseHeight * zoomLevel;

  if (quarterTurns) {
    return { width: h, height: w };
  }
  return { width: w, height: h };
}

function clampOffsets() {
  const viewerRect = viewerMain.getBoundingClientRect();
  const size = getEffectiveSize();

  const maxX = Math.max(0, (size.width - viewerRect.width) / 2);
  const maxY = Math.max(0, (size.height - viewerRect.height) / 2);

  offsetX = clamp(offsetX, -maxX, maxX);
  offsetY = clamp(offsetY, -maxY, maxY);
}

function getMobileFitScale() {
  const rect = viewerMain.getBoundingClientRect();
  const padX = 28;
  const padY = 28;
  const availableW = Math.max(120, rect.width - padX);
  const availableH = Math.max(120, rect.height - padY);
  const baseW = 560;
  const baseH = 792;

  return Math.min(availableW / baseW, availableH / baseH);
}

function applyTransform() {
  if (isMobileView()) {
    const mobileScale = getMobileFitScale();
    const safeScale = Math.round(mobileScale * 1000) / 1000;

    bookPan.style.transform = `translate3d(0px, 0px, 0)`;
    bookTransform.style.transform = `translateZ(0) scale(${safeScale}) rotate(${rotateDeg}deg)`;
    return;
  }

  clampOffsets();
  bookPan.style.transform = `translate3d(${offsetX}px, ${offsetY}px, 0)`;
  bookTransform.style.transform = `translateZ(0) scale(${zoomLevel}) rotate(${rotateDeg}deg)`;

  document.getElementById("zoomReset").innerText = Math.round(zoomLevel * 100) + "%";
  document.getElementById("rotateReset").innerText = `${rotateDeg}°`;
}

function updateThumbActive(index) {
  const allThumbs = document.querySelectorAll(".thumb");
  allThumbs.forEach((thumb, i) => {
    thumb.classList.toggle("active", i === index);
  });

  const activeThumb = allThumbs[index];
  if (activeThumb) {
    activeThumb.scrollIntoView({
      behavior: "smooth",
      block: "nearest",
      inline: "nearest"
    });
  }
}

function updatePage(index) {
  currentPage = index;

  if (isMobileView()) {
    pageText.innerText = `Page ${index + 1} / ${TOTAL_PAGES}`;
  } else {
    if (index === 0) {
      pageText.innerText = "Cover";
    } else {
      const start = index;
      const end = Math.min(index + 1, TOTAL_PAGES - 1);
      pageText.innerText = `Pages ${start} - ${end}`;
    }
  }

  updateThumbActive(index);
}

function updateProgress(loaded, total, text) {
  const percent = total > 0 ? (loaded / total) * 100 : 0;
  progressBar.style.width = `${percent}%`;
  progressText.textContent = `${loaded} / ${total}`;
  if (text) loadingSubtext.textContent = text;
}

function loadImageWithRetry(src, retries = 3, delay = 350) {
  return new Promise((resolve) => {
    let attempt = 0;

    function tryLoad() {
      const img = new Image();
      img.decoding = "async";
      img.loading = "eager";

      img.onload = () => resolve({ ok: true, img, src });
      img.onerror = () => {
        attempt++;
        if (attempt <= retries) {
          setTimeout(tryLoad, delay * attempt);
        } else {
          resolve({ ok: false, img: null, src });
        }
      };

      img.src = src + (src.includes("?") ? "&" : "?") + "v=" + Date.now() + "_" + attempt;
    }

    tryLoad();
  });
}

async function preloadInitialPages() {
  preloadedBookImages.clear();
  updateProgress(0, INITIAL_LOAD_COUNT, "Preparing first pages...");

  for (let i = 0; i < INITIAL_LOAD_COUNT; i++) {
    const src = pageImages[i];
    const result = await loadImageWithRetry(src, 3, 300);

    if (result.ok) {
      preloadedBookImages.set(src, result.img.src);
    } else {
      preloadedBookImages.set(src, src);
    }

    updateProgress(i + 1, INITIAL_LOAD_COUNT, "Loading first 10 pages...");
  }
}

function renderPages() {
  book.innerHTML = "";
  pageImgElements.length = 0;

  pageImages.forEach((src, i) => {
    const page = document.createElement("div");
    page.className = "page";

    const holder = document.createElement("div");
    holder.className = "page-loading";
    holder.textContent = i < INITIAL_LOAD_COUNT ? `Loading page ${i + 1}...` : `Preparing page ${i + 1}...`;

    const img = document.createElement("img");
    img.alt = `Page ${i + 1}`;
    img.loading = i < INITIAL_LOAD_COUNT ? "eager" : "lazy";
    img.decoding = i < INITIAL_LOAD_COUNT ? "sync" : "async";
    img.draggable = false;
    img.dataset.pageIndex = i;

    img.onload = () => {
      holder.style.display = "none";
    };

    img.onerror = () => {
      holder.style.display = "flex";
      holder.textContent = `Reloading page ${i + 1}...`;
      setTimeout(() => {
        img.src = src + (src.includes("?") ? "&" : "?") + "retry=" + Date.now();
      }, 400);
    };

    if (preloadedBookImages.has(src)) {
      img.src = preloadedBookImages.get(src);
    }

    page.appendChild(holder);
    page.appendChild(img);
    book.appendChild(page);
    pageImgElements.push(img);
  });
}

function renderThumbs() {
  thumbs.innerHTML = "";
  thumbImgElements.length = 0;

  pageImages.forEach((src, i) => {
    const t = document.createElement("div");
    t.className = "thumb" + (i === currentPage ? " active" : "");

    const thumbImg = document.createElement("img");
    thumbImg.alt = `Thumbnail ${i + 1}`;
    thumbImg.loading = i < 20 ? "eager" : "lazy";
    thumbImg.src = preloadedBookImages.get(src) || src;

    thumbImg.onerror = () => {
      thumbImg.src = src + (src.includes("?") ? "&" : "?") + "thumbretry=" + Date.now();
    };

    t.appendChild(thumbImg);
    t.onclick = () => {
      if (pageFlip) pageFlip.flip(i);
    };

    thumbs.appendChild(t);
    thumbImgElements.push(thumbImg);
  });
}

function setBookSize() {
  if (isMobileView()) {
    book.style.width = "560px";
    book.style.height = "792px";
  } else {
    book.style.width = "1120px";
    book.style.height = "792px";
  }
}

function initFlip() {
  if (pageFlip) {
    pageFlip.destroy();
    pageFlip = null;
  }

  setBookSize();

  pageFlip = new St.PageFlip(book, {
    width: 560,
    height: 792,
    size: "fixed",
    autoSize: false,
    usePortrait: true,
    showCover: false,
    drawShadow: true,
    flippingTime: isMobileView() ? 420 : 900,
    mobileScrollSupport: false,
    maxShadowOpacity: isMobileView() ? 0.12 : 0.5
  });

  pageFlip.loadFromHTML(book.querySelectorAll(".page"));

  pageFlip.on("changeState", (e) => {
    isFlippingNow = e.data === "flipping";

    if (isMobileView() && isFlippingNow) {
      bookTransform.style.transition = "none";
    }
  });

  pageFlip.on("flip", (e) => {
    isFlippingNow = false;
    updatePage(e.data);
    applyTransform();
  });

  pageFlip.on("init", () => {
    loading.style.display = "none";
    updatePage(currentPage);
    applyTransform();
  });

  if (currentPage > 0) {
    pageFlip.flip(currentPage);
  }
}

async function loadRemainingPagesInBackground() {
  bgStatus.style.display = "block";

  let loadedCount = INITIAL_LOAD_COUNT;

  for (let i = INITIAL_LOAD_COUNT; i < pageImages.length; i++) {
    const src = pageImages[i];

    if (!preloadedBookImages.has(src)) {
      const result = await loadImageWithRetry(src, 3, 250);

      if (result.ok) {
        preloadedBookImages.set(src, result.img.src);
      } else {
        preloadedBookImages.set(src, src);
      }
    }

    if (pageImgElements[i] && !pageImgElements[i].src) {
      pageImgElements[i].src = preloadedBookImages.get(src) || src;
    }

    if (thumbImgElements[i] && !thumbImgElements[i].src) {
      thumbImgElements[i].src = preloadedBookImages.get(src) || src;
    }

    loadedCount++;
    bgStatus.textContent = `Loading remaining pages... ${loadedCount} / ${TOTAL_PAGES}`;

    if ((i + 1) % 4 === 0) {
      await new Promise(resolve => setTimeout(resolve, 20));
    }
  }

  bgStatus.textContent = "All pages loaded";
  setTimeout(() => {
    bgStatus.style.display = "none";
  }, 1500);
}

async function init() {
  loading.style.display = "block";
  bgStatus.style.display = "none";

  await preloadInitialPages();
  renderPages();
  renderThumbs();
  initFlip();
  loadRemainingPagesInBackground();
}

/* Desktop buttons */
document.getElementById("prev").onclick = () => {
  if (!isMobileView() && pageFlip) pageFlip.flipPrev();
};

document.getElementById("next").onclick = () => {
  if (!isMobileView() && pageFlip) pageFlip.flipNext();
};

document.getElementById("zoomIn").onclick = () => {
  if (isMobileView()) return;
  zoomLevel = clamp(zoomLevel + zoomStep, minZoom, maxZoom);
  applyTransform();
};

document.getElementById("zoomOut").onclick = () => {
  if (isMobileView()) return;
  zoomLevel = clamp(zoomLevel - zoomStep, minZoom, maxZoom);
  if (!canPan()) resetPosition();
  applyTransform();
};

document.getElementById("zoomReset").onclick = () => {
  if (isMobileView()) return;
  zoomLevel = defaultZoom;
  if (rotateDeg % 360 === 0) resetPosition();
  applyTransform();
};

document.getElementById("rotateLeft").onclick = () => {
  if (isMobileView()) return;
  rotateDeg -= rotateStep;
  applyTransform();
};

document.getElementById("rotateRight").onclick = () => {
  if (isMobileView()) return;
  rotateDeg += rotateStep;
  applyTransform();
};

document.getElementById("rotateReset").onclick = () => {
  if (isMobileView()) return;
  rotateDeg = 0;
  if (!canPan()) resetPosition();
  applyTransform();
};

document.getElementById("moveUp").onclick = () => {
  if (isMobileView()) return;
  offsetY -= moveStep;
  applyTransform();
};

document.getElementById("moveDown").onclick = () => {
  if (isMobileView()) return;
  offsetY += moveStep;
  applyTransform();
};

viewerMain.addEventListener("wheel", (e) => {
  if (isMobileView()) return;

  e.preventDefault();

  if (e.deltaY < 0) {
    zoomLevel = clamp(zoomLevel + zoomStep, minZoom, maxZoom);
  } else {
    zoomLevel = clamp(zoomLevel - zoomStep, minZoom, maxZoom);
  }

  if (!canPan()) resetPosition();
  applyTransform();
}, { passive: false });

viewerMain.addEventListener("touchstart", (e) => {
  if (isMobileView()) return;

  if (e.touches.length === 2) {
    pinchStartDistance = getTouchDistance(e.touches[0], e.touches[1]);
    pinchStartZoom = zoomLevel;
    isDragging = false;
    return;
  }

  if (e.touches.length === 1 && canPan()) {
    isDragging = true;
    dragStartX = e.touches[0].clientX;
    dragStartY = e.touches[0].clientY;
    startOffsetX = offsetX;
    startOffsetY = offsetY;
  }
}, { passive: false });

viewerMain.addEventListener("touchmove", (e) => {
  if (isMobileView()) return;

  if (e.touches.length === 2) {
    e.preventDefault();

    const currentDistance = getTouchDistance(e.touches[0], e.touches[1]);
    if (pinchStartDistance > 0) {
      const scaleFactor = currentDistance / pinchStartDistance;
      zoomLevel = clamp(pinchStartZoom * scaleFactor, minZoom, maxZoom);

      if (!canPan()) resetPosition();
      applyTransform();
    }
    return;
  }

  if (e.touches.length === 1 && isDragging && canPan()) {
    e.preventDefault();
    offsetX = startOffsetX + (e.touches[0].clientX - dragStartX);
    offsetY = startOffsetY + (e.touches[0].clientY - dragStartY);
    applyTransform();
  }
}, { passive: false });

viewerMain.addEventListener("touchend", () => {
  if (isMobileView()) return;
  isDragging = false;
  pinchStartDistance = 0;
});

let resizeTimeout;
window.onresize = () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => {
    init();
  }, 250);
};

init();
</script>
