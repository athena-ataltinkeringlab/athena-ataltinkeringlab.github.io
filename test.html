<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Athena Global School Yearbook 2025-26</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  color: white;
  overflow: hidden;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

.app {
  padding: 10px;
  height: 100vh;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  padding: 6px 10px;
  border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.35);
  margin-bottom: 6px;
  flex-shrink: 0;
}

.nav-group,
.zoom-group,
.move-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.title-center {
  flex: 1;
  text-align: center;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.05em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.btn {
  padding: 4px 10px;
  background: linear-gradient(45deg, rgba(59,130,246,0.9), rgba(147,51,234,0.9));
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 999px;
  font-weight: 600;
  font-size: 11px;
  transition: all 0.2s;
  box-shadow: 0 3px 10px rgba(59,130,246,0.4);
  white-space: nowrap;
}

.btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 18px rgba(59,130,246,0.5);
}

.page-info {
  font-size: 12px;
  font-weight: 600;
  background: rgba(255,255,255,0.12);
  padding: 6px 10px;
  border-radius: 999px;
  display: inline-block;
  margin-bottom: 6px;
  flex-shrink: 0;
}

.viewer {
  display: grid;
  grid-template-columns: 1fr 150px;
  gap: 10px;
  flex: 1;
  min-height: 0;
}

.main {
  position: relative;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 12px;
  box-shadow: 0 16px 32px rgba(0,0,0,0.4);
  overflow: hidden;
  touch-action: none;
  cursor: default;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.book-center {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: fit-content;
  height: fit-content;
}

.book-pan {
  transform: translate3d(0, 0, 0);
  will-change: transform;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  pointer-events: none;
}

.book-transform {
  transform: translateZ(0) scale(0.8) rotate(0deg);
  transform-origin: center center;
  transition: transform 0.18s ease;
  will-change: transform;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  pointer-events: none;
}

#book {
  width: 1120px;
  height: 792px;
  max-width: none;
  transform: translateZ(0);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  pointer-events: auto;
  touch-action: none;
}

.page {
  background: #ffffff;
  border-radius: 6px;
  overflow: hidden;
  transform: translateZ(0);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  touch-action: none;
}

.page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  user-select: none;
  -webkit-user-drag: none;
  transform: translateZ(0);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  pointer-events: none;
  touch-action: none;
}

.thumbs {
  overflow: auto;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 12px;
  padding: 8px;
  box-shadow: 0 10px 24px rgba(0,0,0,0.35);
}

.thumb {
  margin-bottom: 6px;
  cursor: pointer;
  border-radius: 8px;
  overflow: hidden;
  transition: all 0.15s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
}

.thumb img {
  width: 100%;
  aspect-ratio: 1 / 1.414;
  object-fit: cover;
  display: block;
}

.thumb.active {
  box-shadow: 0 0 0 2px rgba(59,130,246,0.95);
  transform: scale(1.03);
}

.loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 20;
  background: rgba(15, 23, 42, 0.72);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}

.loader-box {
  width: min(360px, 82vw);
  text-align: center;
}

.loader-text {
  font-size: 14px;
  color: rgba(255,255,255,0.92);
  margin-bottom: 10px;
  font-weight: 600;
}

.progress-wrap {
  width: 100%;
  height: 10px;
  background: rgba(255,255,255,0.14);
  border-radius: 999px;
  overflow: hidden;
  box-shadow: inset 0 1px 4px rgba(0,0,0,0.3);
}

.progress-bar {
  width: 0%;
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, #3b82f6, #8b5cf6);
  transition: width 0.2s ease;
}

.progress-label {
  margin-top: 8px;
  font-size: 12px;
  color: rgba(255,255,255,0.72);
}

#desktopHint {
  display: none;
}

.mobile-page-row {
  display: none;
}

@media (max-width:768px) {
  body {
    overflow: hidden;
  }

  .app {
    padding: 8px;
  }

  .topbar {
    justify-content: center;
    padding: 10px 12px;
  }

  .title-center {
    flex: unset;
    width: 100%;
    text-align: center;
    font-size: 13px;
    white-space: normal;
    line-height: 1.35;
  }

  .nav-group,
  .zoom-group,
  .move-group {
    display: none !important;
  }

  .page-info {
    display: none !important;
  }

  .viewer {
    grid-template-columns: 1fr;
    grid-template-rows: minmax(0, 1fr) auto auto auto;
    gap: 8px;
    min-height: 0;
  }

  .main {
    min-height: 0;
    touch-action: none;
  }

  #book,
  .page,
  .page img {
    touch-action: none;
  }

  .mobile-page-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .mobile-btn {
    padding: 7px 14px;
    background: linear-gradient(45deg, rgba(59,130,246,0.9), rgba(147,51,234,0.9));
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 999px;
    font-weight: 600;
    font-size: 12px;
    box-shadow: 0 3px 10px rgba(59,130,246,0.35);
  }

  .mobile-page-text {
    font-size: 12px;
    font-weight: 600;
    background: rgba(255,255,255,0.12);
    padding: 6px 12px;
    border-radius: 999px;
  }

  .thumbs {
    display: block;
    max-height: 110px;
    overflow-x: auto;
    overflow-y: hidden;
    white-space: nowrap;
    padding: 6px;
    border-radius: 10px;
  }

  .thumb {
    display: inline-block;
    width: 62px;
    margin-right: 6px;
    margin-bottom: 0;
    vertical-align: top;
    transform: none !important;
  }

  .thumb.active {
    transform: none !important;
  }

  #desktopHint {
    display: block;
    position: static;
    width: 100%;
    text-align: center;
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    pointer-events: none;
    margin-top: 2px;
    padding-bottom: 2px;
  }
}
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="nav-group">
      <button class="btn" id="prev">‹ Prev</button>
      <button class="btn" id="next">Next ›</button>
    </div>

    <div class="title-center">
      Athena Global School Yearbook 2025-26
    </div>

    <div class="zoom-group">
      <button class="btn" id="zoomOut">−</button>
      <button class="btn" id="zoomReset">80%</button>
      <button class="btn" id="zoomIn">+</button>

      <button class="btn" id="rotateLeft">⟲</button>
      <button class="btn" id="rotateReset">0°</button>
      <button class="btn" id="rotateRight">⟳</button>
    </div>

    <div class="move-group">
      <button class="btn" id="moveUp">↑ Up</button>
      <button class="btn" id="moveDown">↓ Down</button>
    </div>
  </div>

  <div class="page-info" id="pageText">Pages 1 - 2</div>

  <div class="viewer">
    <div class="main" id="viewerMain">
      <div class="loading" id="loading">
        <div class="loader-box">
          <div class="loader-text" id="loadingText">Loading book...</div>
          <div class="progress-wrap">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <div class="progress-label" id="progressLabel">0%</div>
        </div>
      </div>

      <div class="book-center">
        <div class="book-pan" id="bookPan">
          <div class="book-transform" id="bookTransform">
            <div id="book"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="mobile-page-row">
      <button class="mobile-btn" id="mobilePrev">‹ Prev</button>
      <div class="mobile-page-text" id="mobilePageText">Page 1 / 137</div>
      <button class="mobile-btn" id="mobileNext">Next ›</button>
    </div>

    <div class="thumbs" id="thumbs"></div>

    <div id="desktopHint">For better viewing experience, use desktop view</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

<script>
let pageFlip;

const book = document.getElementById("book");
const thumbs = document.getElementById("thumbs");
const pageText = document.getElementById("pageText");
const mobilePageText = document.getElementById("mobilePageText");
const loading = document.getElementById("loading");
const loadingText = document.getElementById("loadingText");
const progressBar = document.getElementById("progressBar");
const progressLabel = document.getElementById("progressLabel");
const viewerMain = document.getElementById("viewerMain");
const bookPan = document.getElementById("bookPan");
const bookTransform = document.getElementById("bookTransform");

const TOTAL_PAGES = 137;
const pageImages = [];
for (let i = 1; i <= TOTAL_PAGES; i++) {
  pageImages.push(`assets/images/Img/${i}.jpg`);
}

let currentPage = 0;

let zoomLevel = 0.8;
const defaultZoom = 0.8;
const minZoom = 0.5;
const maxZoom = 2;
const zoomStep = 0.05;

let rotateDeg = 0;
const rotateStep = 90;

let offsetX = 0;
let offsetY = 0;
let isDragging = false;
let dragStartX = 0;
let dragStartY = 0;
let startOffsetX = 0;
let startOffsetY = 0;

let pinchStartDistance = 0;
let pinchStartZoom = zoomLevel;

const moveStep = 40;

let initializedPages = false;
let thumbsRendered = false;
let lastMobileMode = isMobileView();
let flipReady = false;
let visibilityRestoreTimer = null;

let mobileSwipeStartX = 0;
let mobileSwipeStartY = 0;
let mobileSwipeTracking = false;

function isMobileView() {
  return window.innerWidth <= 768;
}

function getBookBaseWidth() {
  return isMobileView() ? 560 : 1120;
}

function getBookBaseHeight() {
  return 792;
}

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function getTouchDistance(t1, t2) {
  const dx = t2.clientX - t1.clientX;
  const dy = t2.clientY - t1.clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

function canPan() {
  return !isMobileView() && (zoomLevel > defaultZoom + 0.01 || rotateDeg % 360 !== 0);
}

function resetPosition() {
  offsetX = 0;
  offsetY = 0;
}

function getEffectiveSize() {
  const baseWidth = getBookBaseWidth();
  const baseHeight = getBookBaseHeight();

  const normalizedRotate = ((rotateDeg % 360) + 360) % 360;
  const quarterTurns = normalizedRotate === 90 || normalizedRotate === 270;

  const w = baseWidth * zoomLevel;
  const h = baseHeight * zoomLevel;

  if (quarterTurns) {
    return { width: h, height: w };
  }
  return { width: w, height: h };
}

function clampOffsets() {
  const viewerRect = viewerMain.getBoundingClientRect();
  const size = getEffectiveSize();

  const maxX = Math.max(0, (size.width - viewerRect.width) / 2);
  const maxY = Math.max(0, (size.height - viewerRect.height) / 2);

  offsetX = clamp(offsetX, -maxX, maxX);
  offsetY = clamp(offsetY, -maxY, maxY);
}

function getMobileFitScale() {
  const rect = viewerMain.getBoundingClientRect();
  const padX = 36;
  const padY = 36;
  const availableW = Math.max(120, rect.width - padX);
  const availableH = Math.max(120, rect.height - padY);
  const baseW = 560;
  const baseH = 792;

  return Math.min(availableW / baseW, availableH / baseH, 1);
}

function applyTransform() {
  if (isMobileView()) {
    const mobileScale = getMobileFitScale();
    bookPan.style.transform = `translate3d(0px, 0px, 0px)`;
    bookTransform.style.transform = `translateZ(0) scale(${mobileScale}) rotate(0deg)`;
    return;
  }

  clampOffsets();
  bookPan.style.transform = `translate3d(${offsetX}px, ${offsetY}px, 0px)`;
  bookTransform.style.transform = `translateZ(0) scale(${zoomLevel}) rotate(${rotateDeg}deg)`;

  document.getElementById("zoomReset").innerText = Math.round(zoomLevel * 100) + "%";
  document.getElementById("rotateReset").innerText = `${rotateDeg}°`;
}

function updateThumbActive(index) {
  const allThumbs = document.querySelectorAll(".thumb");
  allThumbs.forEach((thumb, i) => {
    thumb.classList.toggle("active", i === index);
  });

  const activeThumb = allThumbs[index];
  if (activeThumb) {
    activeThumb.scrollIntoView({
      behavior: "smooth",
      block: "nearest",
      inline: "nearest"
    });
  }
}

function updatePage(index) {
  currentPage = index;

  if (isMobileView()) {
    const txt = `Page ${index + 1} / ${TOTAL_PAGES}`;
    pageText.innerText = txt;
    mobilePageText.innerText = txt;
  } else {
    if (index === 0) {
      pageText.innerText = "Cover";
    } else {
      const start = index;
      const end = Math.min(index + 1, TOTAL_PAGES - 1);
      pageText.innerText = `Pages ${start} - ${end}`;
    }
  }

  updateThumbActive(index);
}

function updateProgress(done, total, text = "Loading book...") {
  const percent = total > 0 ? Math.round((done / total) * 100) : 0;
  loadingText.textContent = text;
  progressBar.style.width = percent + "%";
  progressLabel.textContent = percent + "%";
}

function createPageElement(src, index) {
  const page = document.createElement("div");
  page.className = "page";

  const img = document.createElement("img");
  img.alt = `Page ${index + 1}`;
  img.draggable = false;
  img.decoding = "async";
  img.loading = index < 10 ? "eager" : "lazy";
  if ("fetchPriority" in img) {
    img.fetchPriority = index < 6 ? "high" : "auto";
  }
  img.src = src;

  page.appendChild(img);
  return page;
}

function renderPages() {
  if (initializedPages) return;
  book.innerHTML = "";
  pageImages.forEach((src, i) => {
    book.appendChild(createPageElement(src, i));
  });
  initializedPages = true;
}

function renderThumbs() {
  if (thumbsRendered) return;
  thumbs.innerHTML = "";
  pageImages.forEach((src, i) => {
    const t = document.createElement("div");
    t.className = "thumb" + (i === currentPage ? " active" : "");

    const img = document.createElement("img");
    img.src = src;
    img.alt = `Thumbnail ${i + 1}`;
    img.loading = "lazy";
    img.decoding = "async";

    t.appendChild(img);
    t.onclick = () => {
      if (pageFlip && flipReady) pageFlip.flip(i);
    };

    thumbs.appendChild(t);
  });
  thumbsRendered = true;
}

function preloadImage(src) {
  return new Promise((resolve) => {
    const img = new Image();
    img.decoding = "async";
    const done = () => resolve(true);
    img.onload = done;
    img.onerror = done;
    img.src = src;
    if (img.complete) resolve(true);
  });
}

async function preloadCriticalPages() {
  const firstBatch = pageImages.slice(0, 10);

  for (let i = 0; i < firstBatch.length; i++) {
    await preloadImage(firstBatch[i]);
    updateProgress(i + 1, firstBatch.length, "Loading first pages...");
  }
}

async function warmRemainingPagesInBackground() {
  const rest = pageImages.slice(10);
  const total = rest.length;

  for (let i = 0; i < total; i++) {
    preloadImage(rest[i]);
    if ((i + 1) % 12 === 0 || i === total - 1) {
      await new Promise(resolve => setTimeout(resolve, 0));
    }
  }
}

function setBookSize() {
  if (isMobileView()) {
    book.style.width = "560px";
    book.style.height = "792px";
  } else {
    book.style.width = "1120px";
    book.style.height = "792px";
  }
}

function destroyFlip() {
  if (pageFlip) {
    try {
      pageFlip.destroy();
    } catch (e) {}
    pageFlip = null;
  }
  flipReady = false;
}

function initFlip() {
  destroyFlip();
  setBookSize();

  pageFlip = new St.PageFlip(book, {
    width: 560,
    height: 792,
    size: "fixed",
    autoSize: false,
    usePortrait: true,
    showCover: false,
    drawShadow: !isMobileView(),
    flippingTime: isMobileView() ? 720 : 850,
    mobileScrollSupport: false,
    maxShadowOpacity: isMobileView() ? 0 : 0.35,
    useMouseEvents: true,
    swipeDistance: isMobileView() ? 2 : 18,
    clickEventForward: false
  });

  pageFlip.loadFromHTML(book.querySelectorAll(".page"));

  pageFlip.on("flip", (e) => {
    updatePage(e.data);
  });

  pageFlip.on("init", () => {
    flipReady = true;
    loading.style.display = "none";
    updatePage(currentPage);
    applyTransform();
  });

  if (currentPage > 0) {
    setTimeout(() => {
      if (pageFlip && flipReady) pageFlip.flip(currentPage);
    }, 40);
  } else {
    applyTransform();
  }
}

async function init() {
  loading.style.display = "flex";
  updateProgress(0, 10, "Preparing book...");

  renderPages();
  renderThumbs();

  await preloadCriticalPages();
  updateProgress(10, 10, "Starting viewer...");

  initFlip();
  warmRemainingPagesInBackground();
}

function flipPrevPage() {
  if (pageFlip && flipReady) pageFlip.flipPrev();
}

function flipNextPage() {
  if (pageFlip && flipReady) pageFlip.flipNext();
}

function safelyRestoreFlipbook() {
  if (document.hidden) return;

  setTimeout(() => {
    try {
      applyTransform();

      if (!pageFlip || !flipReady) {
        initFlip();
        return;
      }

      if (typeof pageFlip.update === "function") {
        pageFlip.update();
      }

      if (typeof pageFlip.turnToPage === "function") {
        pageFlip.turnToPage(currentPage);
      } else if (typeof pageFlip.flip === "function" && currentPage > 0) {
        pageFlip.flip(currentPage);
      }

      applyTransform();
      updatePage(currentPage);
    } catch (e) {
      initFlip();
    }
  }, 120);
}

document.getElementById("prev").onclick = flipPrevPage;
document.getElementById("next").onclick = flipNextPage;
document.getElementById("mobilePrev").onclick = flipPrevPage;
document.getElementById("mobileNext").onclick = flipNextPage;

document.getElementById("zoomIn").onclick = () => {
  if (isMobileView()) return;
  zoomLevel = clamp(zoomLevel + zoomStep, minZoom, maxZoom);
  applyTransform();
};

document.getElementById("zoomOut").onclick = () => {
  if (isMobileView()) return;
  zoomLevel = clamp(zoomLevel - zoomStep, minZoom, maxZoom);
  if (!canPan()) resetPosition();
  applyTransform();
};

document.getElementById("zoomReset").onclick = () => {
  if (isMobileView()) return;
  zoomLevel = defaultZoom;
  if (rotateDeg % 360 === 0) resetPosition();
  applyTransform();
};

document.getElementById("rotateLeft").onclick = () => {
  if (isMobileView()) return;
  rotateDeg -= rotateStep;
  applyTransform();
};

document.getElementById("rotateRight").onclick = () => {
  if (isMobileView()) return;
  rotateDeg += rotateStep;
  applyTransform();
};

document.getElementById("rotateReset").onclick = () => {
  if (isMobileView()) return;
  rotateDeg = 0;
  if (!canPan()) resetPosition();
  applyTransform();
};

document.getElementById("moveUp").onclick = () => {
  if (isMobileView()) return;
  offsetY -= moveStep;
  applyTransform();
};

document.getElementById("moveDown").onclick = () => {
  if (isMobileView()) return;
  offsetY += moveStep;
  applyTransform();
};

viewerMain.addEventListener("wheel", (e) => {
  if (isMobileView()) return;

  e.preventDefault();

  if (e.deltaY < 0) {
    zoomLevel = clamp(zoomLevel + zoomStep, minZoom, maxZoom);
  } else {
    zoomLevel = clamp(zoomLevel - zoomStep, minZoom, maxZoom);
  }

  if (!canPan()) resetPosition();
  applyTransform();
}, { passive: false });

viewerMain.addEventListener("touchstart", (e) => {
  if (isMobileView()) return;

  if (e.touches.length === 2) {
    pinchStartDistance = getTouchDistance(e.touches[0], e.touches[1]);
    pinchStartZoom = zoomLevel;
    isDragging = false;
    return;
  }

  if (e.touches.length === 1 && canPan()) {
    isDragging = true;
    dragStartX = e.touches[0].clientX;
    dragStartY = e.touches[0].clientY;
    startOffsetX = offsetX;
    startOffsetY = offsetY;
  }
}, { passive: false });

viewerMain.addEventListener("touchmove", (e) => {
  if (isMobileView()) return;

  if (e.touches.length === 2) {
    e.preventDefault();
    const currentDistance = getTouchDistance(e.touches[0], e.touches[1]);
    if (pinchStartDistance > 0) {
      const scaleFactor = currentDistance / pinchStartDistance;
      zoomLevel = clamp(pinchStartZoom * scaleFactor, minZoom, maxZoom);
      if (!canPan()) resetPosition();
      applyTransform();
    }
    return;
  }

  if (e.touches.length === 1 && isDragging && canPan()) {
    e.preventDefault();
    offsetX = startOffsetX + (e.touches[0].clientX - dragStartX);
    offsetY = startOffsetY + (e.touches[0].clientY - dragStartY);
    applyTransform();
  }
}, { passive: false });

viewerMain.addEventListener("touchend", () => {
  if (isMobileView()) return;
  isDragging = false;
  pinchStartDistance = 0;
});

book.addEventListener("touchstart", (e) => {
  if (!isMobileView()) return;
  if (!pageFlip || !flipReady) return;
  if (e.touches.length !== 1) return;

  mobileSwipeTracking = true;
  mobileSwipeStartX = e.touches[0].clientX;
  mobileSwipeStartY = e.touches[0].clientY;
}, { passive: true });

book.addEventListener("touchend", (e) => {
  if (!isMobileView()) return;
  if (!pageFlip || !flipReady) return;
  if (!mobileSwipeTracking) return;
  if (!e.changedTouches || !e.changedTouches.length) return;

  const dx = e.changedTouches[0].clientX - mobileSwipeStartX;
  const dy = e.changedTouches[0].clientY - mobileSwipeStartY;

  mobileSwipeTracking = false;

  if (Math.abs(dx) > 35 && Math.abs(dx) > Math.abs(dy) * 1.2) {
    if (dx < 0) {
      pageFlip.flipNext();
    } else {
      pageFlip.flipPrev();
    }
  }
}, { passive: true });

book.addEventListener("touchcancel", () => {
  mobileSwipeTracking = false;
}, { passive: true });

let resizeTimeout;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => {
    const newMobileMode = isMobileView();
    if (newMobileMode !== lastMobileMode) {
      lastMobileMode = newMobileMode;
      initFlip();
    } else {
      applyTransform();
      safelyRestoreFlipbook();
    }
  }, 250);
});

document.addEventListener("visibilitychange", () => {
  if (!document.hidden) {
    clearTimeout(visibilityRestoreTimer);
    visibilityRestoreTimer = setTimeout(() => {
      safelyRestoreFlipbook();
    }, 100);
  }
});

window.addEventListener("focus", () => {
  clearTimeout(visibilityRestoreTimer);
  visibilityRestoreTimer = setTimeout(() => {
    safelyRestoreFlipbook();
  }, 100);
});

init();
</script>

</body>
