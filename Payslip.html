<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payslip Generator</title>

<link rel="stylesheet" href="assets/css/stylepay.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

<div class="container">
  <h2>Athena Payslip Generator</h2>
  <div class="app-subtitle">Salary advice for staff · PDF ready layout</div>

  <div class="toolbar">
    <span class="toolbar-group-label">Upload file</span>
    <input type="file" id="excelFile">

    <span class="toolbar-group-label">Month</span>
    <select id="monthSelect">
      <option>January</option><option>February</option><option>March</option>
      <option>April</option><option>May</option><option>June</option>
      <option>July</option><option>August</option><option>September</option>
      <option>October</option><option>November</option><option>December</option>
    </select>

    <select id="yearSelect"></select>

    <span class="toolbar-group-label">Location</span>
    <select id="locationSelect" onchange="renderAll()">
      <option>Chennai</option>
      <option>Chengalpattu</option>
      <option>Chidambaram</option>
    </select>

    <button onclick="processExcel()">Preview</button>
    <button onclick="downloadAll()">Download PDFs</button>
    <button onclick="sendAllEmails()">Send Emails</button>
  </div>

  <div id="preview"></div>
</div>

<script src="assets/js/scriptpay.js"></script>
</body>
</html>
