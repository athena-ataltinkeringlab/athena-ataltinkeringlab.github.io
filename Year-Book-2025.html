<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Athena Global School Yearbook 2025-26</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  color: white;
  overflow: hidden;
}

.app {
  padding: 10px;
  height: 100vh;
  box-sizing: border-box;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(16px);
  padding: 6px 10px;
  border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.35);
  margin-bottom: 6px;
}

.nav-group,
.zoom-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.title-center {
  flex: 1;
  text-align: center;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.05em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.btn {
  padding: 4px 10px;
  background: linear-gradient(45deg, rgba(59,130,246,0.9), rgba(147,51,234,0.9));
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 999px;
  font-weight: 600;
  font-size: 11px;
  transition: all 0.2s;
  box-shadow: 0 3px 10px rgba(59,130,246,0.4);
  white-space: nowrap;
}

.btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 18px rgba(59,130,246,0.5);
}

.page-info {
  font-size: 12px;
  font-weight: 600;
  background: rgba(255,255,255,0.12);
  padding: 3px 8px;
  border-radius: 999px;
  display: inline-block;
  margin-bottom: 6px;
}

.viewer {
  display: grid;
  grid-template-columns: 1fr 150px;
  gap: 10px;
  height: calc(100vh - 70px);
}

.main {
  display: flex;
  justify-content: center;
  align-items: center;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(16px);
  border-radius: 12px;
  box-shadow: 0 16px 32px rgba(0,0,0,0.4);
  position: relative;
  overflow: hidden;
  touch-action: none;
  cursor: grab;
}

.main.dragging {
  cursor: grabbing;
}

.book-wrapper {
  transform-origin: center center;
  transition: transform 0.12s ease;
  will-change: transform;
}

#book {
  width: 1120px;
  height: 792px;
  max-width: 100%;
}

.page {
  background: #ffffff;
  border-radius: 6px;
  overflow: hidden;
}

.page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.thumbs {
  overflow: auto;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(16px);
  border-radius: 12px;
  padding: 8px;
  box-shadow: 0 10px 24px rgba(0,0,0,0.35);
}

.thumb {
  margin-bottom: 6px;
  cursor: pointer;
  border-radius: 8px;
  overflow: hidden;
  transition: all 0.15s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
}

.thumb img {
  width: 100%;
  aspect-ratio: 1/1.414;
  object-fit: cover;
}

.thumb.active {
  box-shadow: 0 0 0 2px rgba(59,130,246,0.95);
  transform: scale(1.03);
}

.loading {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 16px;
  color: rgba(255,255,255,0.7);
}

@media (max-width:768px) {
  .viewer {
    grid-template-columns: 1fr;
    gap: 8px;
    height: calc(100vh - 90px);
  }

  .topbar {
    flex-wrap: wrap;
    row-gap: 4px;
  }

  .title-center {
    order: 1;
    flex-basis: 100%;
    text-align: center;
  }

  .nav-group {
    order: 0;
  }

  .zoom-group {
    order: 2;
    flex-wrap: wrap;
    justify-content: center;
  }
}
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="nav-group">
      <button class="btn" id="prev">‹ Prev</button>
      <button class="btn" id="next">Next ›</button>
    </div>

    <div class="title-center">
      Athena Global School Yearbook 2025-26
    </div>

    <div class="zoom-group">
      <button class="btn" id="zoomOut">−</button>
      <button class="btn" id="zoomReset">80%</button>
      <button class="btn" id="zoomIn">+</button>

      <button class="btn" id="rotateLeft">⟲</button>
      <button class="btn" id="rotateReset">0°</button>
      <button class="btn" id="rotateRight">⟳</button>
    </div>
  </div>

  <div class="page-info" id="pageText">Pages 1 - 2</div>

  <div class="viewer">
    <div class="main" id="viewerMain">
      <div class="loading" id="loading">Loading...</div>
      <div class="book-wrapper" id="bookWrapper">
        <div id="book"></div>
      </div>
    </div>

    <div class="thumbs" id="thumbs"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

<script>
let pageFlip;
const book = document.getElementById("book");
const thumbs = document.getElementById("thumbs");
const pageText = document.getElementById("pageText");
const loading = document.getElementById("loading");
const bookWrapper = document.getElementById("bookWrapper");
const viewerMain = document.getElementById("viewerMain");

const TOTAL_PAGES = 136;
const pageImages = [];
for (let i = 1; i <= TOTAL_PAGES; i++) {
  pageImages.push(`assets/images/Img/${i}.jpg`);
}

let currentPage = 0;

let zoomLevel = 0.8;
const defaultZoom = 0.8;
const minZoom = 0.5;
const maxZoom = 2.5;
const zoomStep = 0.05;

let rotateDeg = 0;
const rotateStep = 90;

let offsetX = 0;
let offsetY = 0;

let isDragging = false;
let dragStartX = 0;
let dragStartY = 0;
let startOffsetX = 0;
let startOffsetY = 0;

let pinchStartDistance = 0;
let pinchStartZoom = zoomLevel;
let pinchStartOffsetX = 0;
let pinchStartOffsetY = 0;

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function getTouchDistance(touch1, touch2) {
  const dx = touch2.clientX - touch1.clientX;
  const dy = touch2.clientY - touch1.clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

function applyTransform() {
  bookWrapper.style.transform =
    `translate(${offsetX}px, ${offsetY}px) scale(${zoomLevel}) rotate(${rotateDeg}deg)`;

  document.getElementById("zoomReset").innerText = Math.round(zoomLevel * 100) + "%";
  document.getElementById("rotateReset").innerText = `${rotateDeg}°`;
}

function resetPosition() {
  offsetX = 0;
  offsetY = 0;
}

document.getElementById("zoomIn").onclick = () => {
  zoomLevel = clamp(zoomLevel + zoomStep, minZoom, maxZoom);
  applyTransform();
};

document.getElementById("zoomOut").onclick = () => {
  zoomLevel = clamp(zoomLevel - zoomStep, minZoom, maxZoom);
  if (zoomLevel <= defaultZoom) resetPosition();
  applyTransform();
};

document.getElementById("zoomReset").onclick = () => {
  zoomLevel = defaultZoom;
  resetPosition();
  applyTransform();
};

document.getElementById("rotateLeft").onclick = () => {
  rotateDeg -= rotateStep;
  applyTransform();
};

document.getElementById("rotateRight").onclick = () => {
  rotateDeg += rotateStep;
  applyTransform();
};

document.getElementById("rotateReset").onclick = () => {
  rotateDeg = 0;
  applyTransform();
};

viewerMain.addEventListener("wheel", (e) => {
  e.preventDefault();

  if (e.deltaY < 0) {
    zoomLevel = clamp(zoomLevel + zoomStep, minZoom, maxZoom);
  } else {
    zoomLevel = clamp(zoomLevel - zoomStep, minZoom, maxZoom);
    if (zoomLevel <= defaultZoom) resetPosition();
  }

  applyTransform();
}, { passive: false });

viewerMain.addEventListener("mousedown", (e) => {
  if (zoomLevel <= defaultZoom) return;
  isDragging = true;
  viewerMain.classList.add("dragging");
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  startOffsetX = offsetX;
  startOffsetY = offsetY;
});

window.addEventListener("mousemove", (e) => {
  if (!isDragging) return;
  offsetX = startOffsetX + (e.clientX - dragStartX);
  offsetY = startOffsetY + (e.clientY - dragStartY);
  applyTransform();
});

window.addEventListener("mouseup", () => {
  isDragging = false;
  viewerMain.classList.remove("dragging");
});

viewerMain.addEventListener("touchstart", (e) => {
  if (e.touches.length === 2) {
    pinchStartDistance = getTouchDistance(e.touches[0], e.touches[1]);
    pinchStartZoom = zoomLevel;
    pinchStartOffsetX = offsetX;
    pinchStartOffsetY = offsetY;
    isDragging = false;
  } else if (e.touches.length === 1 && zoomLevel > defaultZoom) {
    isDragging = true;
    dragStartX = e.touches[0].clientX;
    dragStartY = e.touches[0].clientY;
    startOffsetX = offsetX;
    startOffsetY = offsetY;
  }
}, { passive: false });

viewerMain.addEventListener("touchmove", (e) => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const currentDistance = getTouchDistance(e.touches[0], e.touches[1]);

    if (pinchStartDistance > 0) {
      const scaleFactor = currentDistance / pinchStartDistance;
      zoomLevel = clamp(pinchStartZoom * scaleFactor, minZoom, maxZoom);
      applyTransform();
    }
  } else if (e.touches.length === 1 && isDragging && zoomLevel > defaultZoom) {
    e.preventDefault();
    offsetX = startOffsetX + (e.touches[0].clientX - dragStartX);
    offsetY = startOffsetY + (e.touches[0].clientY - dragStartY);
    applyTransform();
  }
}, { passive: false });

viewerMain.addEventListener("touchend", (e) => {
  if (e.touches.length < 2) pinchStartDistance = 0;
  if (e.touches.length === 0) isDragging = false;
  if (zoomLevel <= defaultZoom) resetPosition();
  applyTransform();
});

function renderPages() {
  book.innerHTML = "";
  pageImages.forEach((src) => {
    const page = document.createElement("div");
    page.className = "page";
    page.innerHTML = `<img src="${src}" alt="Page">`;
    book.appendChild(page);
  });
}

function renderThumbs() {
  thumbs.innerHTML = "";
  pageImages.forEach((src, i) => {
    const t = document.createElement("div");
    t.className = "thumb" + (i === 0 ? " active" : "");
    t.innerHTML = `<img src="${src}" loading="lazy" alt="Thumbnail ${i + 1}">`;
    t.onclick = () => {
      pageFlip.flip(i);
      updateThumbActive(i);
    };
    thumbs.appendChild(t);
  });
}

function updateThumbActive(index) {
  const allThumbs = document.querySelectorAll(".thumb");
  allThumbs.forEach((thumb, i) => {
    thumb.classList.toggle("active", i === index);
  });

  const activeThumb = allThumbs[index];
  if (activeThumb) {
    activeThumb.scrollIntoView({
      behavior: "smooth",
      block: "nearest",
      inline: "nearest"
    });
  }
}

function updatePage(index) {
  currentPage = index;
  if (window.innerWidth <= 768) {
    pageText.innerText = `Page ${index + 1}`;
  } else {
    pageText.innerText = `Pages ${index + 1} - ${Math.min(index + 2, TOTAL_PAGES)}`;
  }
  updateThumbActive(index);
}

function initFlip() {
  if (pageFlip) pageFlip.destroy();

  pageFlip = new St.PageFlip(book, {
    width: 560,
    height: 792,
    size: "fixed",
    autoSize: false,
    usePortrait: true,
    showCover: false,
    drawShadow: true,
    flippingTime: 900,
    mobileScrollSupport: false
  });

  pageFlip.loadFromHTML(book.querySelectorAll(".page"));

  pageFlip.on("flip", (e) => {
    updatePage(e.data);
  });

  pageFlip.on("init", () => {
    loading.style.display = "none";
    updatePage(0);
  });
}

function init() {
  loading.style.display = "block";
  renderPages();
  renderThumbs();
  initFlip();
}

document.getElementById("prev").onclick = () => pageFlip && pageFlip.flipPrev();
document.getElementById("next").onclick = () => pageFlip && pageFlip.flipNext();

let resizeTimeout;
window.onresize = () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => {
    const page = pageFlip ? pageFlip.getCurrentPageIndex() : 0;
    init();
    if (pageFlip) pageFlip.flip(page);
    applyTransform();
  }, 250);
};

init();
applyTransform();
</script>

</body>
</html>
